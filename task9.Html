<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix lite</title>
    <link rel="shortcut icon" href="netflix.png" type="image/x-icon">
    <style>
        body {
            height: 100vh;
            width: 100%;
            background-image: url(https://slidechef.net/wp-content/uploads/2021/12/Netflix-Template-Cover-Image-768x437.png);
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
        }

        .logo {
            font-size: 40px;
            font-weight: 700;
            color: #fb9a07;
            font-family: Arial, sans-serif;
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .heading {
            font-size: 40px;
            font-weight: 700;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center; 
        }

        .subheading {
            font-size: 20px;
            font-weight: 500;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center; 
        }

        .latter {
            font-size: 20px;
            font-weight: 500;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center; 
        }

        .center-content {
            display: flex;              
            flex-direction: column;     
            align-items: center;        
            margin-top: 150px;
        }

        input {
            height: 50px;
            width: 350px;
            background: #000;
            border: 1px solid gray;
            color: white;
            padding-left: 15px;
        }

        button {
            background-color: #f18d0b;
            color: white;
            border: none;
            padding: 20px 20px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        .sign_in {
            background-color: #df7307;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            position: absolute;
            top: 30px;
            right: 5px;
        }

        .lan-select {
            color: white;
            border: 1px solid white;
            background: #000;
            padding: 10px 10px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            position: absolute;
            top: 30px;
            right: 100px;
        }
    </style>
</head>

<body>
    <h1 class="logo">NETFLIX</h1>
    <button class="sign_in">Sign in</button>
    <select class="lan-select">
        <option value="en"> 木A English</option>
        <option value="mr"> 木A Marathi</option>
        <option value="hi"> 木A Hindi</option>
    </select>

    <div class="center-content">
        <h1 class="heading">Unlimited movies,shows,<br>and more</h1>
        <h1 class="subheading">Starts at ₹199. Cancel at any time.</h1>
        <h1 class="latter">Ready to watch? Enter your email to create or restart your  <br> membership.</h1>
        <div>
            <input type="email" placeholder="Enter Your Email/Phone...">
            <button>Get Started ></button>
        </div>
    </div>
 <div></div>
 <div></div>
 <div></div>
 <div></div>
</body>

</html>
